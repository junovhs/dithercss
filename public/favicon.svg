  <g fill="#c9ff57">
    <circle cx="6"  cy="6"  r="0.9"/><circle cx="13" cy="6"  r="1.5"/><circle cx="20" cy="6"  r="2.1"/><circle cx="27" cy="6"  r="2.7"/>
    <circle cx="6"  cy="13" r="1.2"/><circle cx="13" cy="13" r="1.8"/><circle cx="20" cy="13" r="2.4"/><circle cx="27" cy="13" r="3.0"/>
    <circle cx="6"  cy="20" r="0.9"/><circle cx="13" cy="20" r="1.5"/><circle cx="20" cy="20" r="2.1"/><circle cx="27" cy="20" r="2.7"/>
    <circle cx="6"  cy="27" r="1.2"/><circle cx="13" cy="27" r="1.8"/><circle cx="20" cy="27" r="2.4"/><circle cx="27" cy="27" r="3.0"/>
  </g>
</svg>
