<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>ASCII Video Studio</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">LOCAL VIDEO TOOL</div>
        <h1>ASCII Video Studio</h1>
      </div>
      <div class="top-actions">
        <span class="privacy-pill">Runs in your browser</span>
        <button id="loadButton" class="button button-primary">Load video</button>
        <input id="fileInput" type="file" accept="video/*" hidden />
      </div>
    </header>

    <main class="workspace">
      <section class="stage-card">
        <div id="dropZone" class="drop-zone">
          <div class="drop-icon">▶</div>
          <h2>Drop a video clip here</h2>
          <p>MP4, WebM, MOV, or any format your browser can decode.</p>
          <button id="dropLoadButton" class="button button-primary">Choose video</button>
        </div>

        <div id="playerArea" class="player-area is-hidden">
          <div id="visualGrid" class="visual-grid original-hidden">
            <div id="originalPane" class="pane original-pane">
              <div class="pane-label">ORIGINAL</div>
              <video id="sourceVideo" playsinline preload="metadata"></video>
            </div>
            <div class="pane ascii-pane">
              <div class="pane-label">ASCII OUTPUT</div>
              <canvas id="asciiCanvas"></canvas>
            </div>
          </div>

          <div class="transport">
            <button id="playPause" class="icon-button" aria-label="Play or pause">▶</button>
            <span id="currentTime" class="timecode">00:00</span>
            <input id="timeline" class="timeline" type="range" min="0" max="1000" value="0" />
            <span id="duration" class="timecode">00:00</span>
            <button id="restartButton" class="icon-button" aria-label="Restart">↺</button>
            <label class="check-label"><input id="showOriginal" type="checkbox" /> Compare</label>
          </div>

          <div class="export-strip">
            <button id="pngButton" class="button">PNG frame</button>
            <button id="txtButton" class="button">TXT frame</button>
            <button id="htmlButton" class="button">HTML frame</button>
            <button id="recordButton" class="button button-record">Record WebM</button>
            <span id="recordStatus" class="record-status"></span>
          </div>
        </div>
      </section>

      <aside class="control-panel">
        <section class="panel-section preset-section">
          <div class="section-heading">
            <div>
              <div class="section-kicker">LOOK</div>
              <h2>Presets</h2>
            </div>
            <button id="autoTuneButton" class="text-button">Auto tune</button>
          </div>
          <div id="presetGrid" class="preset-grid"></div>
          <div class="custom-preset-row">
            <input id="customPresetName" type="text" maxlength="30" placeholder="Custom preset name" />
            <button id="savePresetButton" class="button">Save</button>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading compact">
            <div>
              <div class="section-kicker">STRUCTURE</div>
              <h2>ASCII mapping</h2>
            </div>
            <button id="resetButton" class="text-button">Reset</button>
          </div>

          <label class="control-row select-row">
            <span>Glyph set</span>
            <select id="glyphSet">
              <option value="classic">Classic ASCII</option>
              <option value="dense">Dense ASCII</option>
              <option value="blocks">Unicode blocks</option>
              <option value="braille">Braille texture</option>
              <option value="minimal">Minimal</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label id="customGlyphRow" class="control-row text-row is-hidden">
            <span>Characters</span>
            <input id="customGlyphs" type="text" value=" .:-=+*#%@" />
          </label>
          <label class="control-row select-row">
            <span>Font</span>
            <select id="fontFamily">
              <option value="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">System Mono</option>
              <option value="'Courier New', Courier, monospace">Courier New</option>
              <option value="'Lucida Console', Monaco, monospace">Lucida Console</option>
              <option value="monospace">Browser Mono</option>
            </select>
          </label>
          <div id="mappingControls"></div>
          <label class="toggle-row"><span>Directional edge glyphs</span><input id="directionalEdges" type="checkbox" checked /></label>
          <label class="toggle-row"><span>Invert density</span><input id="invert" type="checkbox" /></label>
        </section>

        <section class="panel-section">
          <div class="section-heading compact">
            <div>
              <div class="section-kicker">IMAGE</div>
              <h2>Tone and color</h2>
            </div>
          </div>
          <label class="control-row select-row">
            <span>Color mode</span>
            <select id="colorMode">
              <option value="source">Source color</option>
              <option value="mono">Monochrome</option>
              <option value="matrix">Matrix green</option>
              <option value="amber">Amber CRT</option>
              <option value="cyan">Cyan terminal</option>
              <option value="ansi">ANSI 16</option>
            </select>
          </label>
          <div id="imageControls"></div>
          <label class="control-row color-row"><span>Background</span><input id="backgroundColor" type="color" value="#05070a" /></label>
          <label class="control-row color-row"><span>Mono color</span><input id="monoColor" type="color" value="#f5f7fa" /></label>
        </section>

        <section class="panel-section">
          <div class="section-heading compact">
            <div>
              <div class="section-kicker">TIME</div>
              <h2>Motion</h2>
            </div>
          </div>
          <div id="motionControls"></div>
          <label class="toggle-row"><span>Reset smoothing after seek</span><input id="resetOnSeek" type="checkbox" checked /></label>
        </section>
      </aside>
    </main>
  </div>

  <canvas id="sourceCanvas" hidden></canvas>
  <canvas id="glyphCanvas" hidden></canvas>
  <div id="toast" class="toast" role="status"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
