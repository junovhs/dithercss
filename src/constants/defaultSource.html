<!-- ===========================================================================
     Ishoo hero orb · SLEEPING
     ---------------------------------------------------------------------------
     ONE self-contained, portable orb: a bobbing gradient sphere with a
     crescent moon and two floating "Zz". A hero STATE is just three things:

         a background video  +  ONE orb file (this)  +  colored text

     • Production references this file directly: src/ui/home/hero.rs mounts it
       for the Calm state via include_str! + dangerous_inner_html (the same way
       the mp4 is include_bytes!'d from this folder). Edit here = edit the app.
     • It is also a standalone preview: open this file in a browser and you see
       the orb by itself on white. Hand it to an AI and ask for a new variant.

     Everything is namespaced under .ishoo-orb so the injected <style> can never
     collide with the rest of the app. To author a NEW state's orb, copy this
     file, keep the .ishoo-orb / __wrap / __ball skeleton + bob motion, and swap
     the gradient, the glyph, and the set-dressing.
     =========================================================================== -->
<style>
  /* ---- the sphere ------------------------------------------------------- */
  .ishoo-orb {
    display: grid;
    place-items: center;
    width: 130px;
    height: 130px;
    line-height: 0;
  }
  .ishoo-orb__wrap {
    position: relative;
    animation: ishoo-orb-bob 4.6s ease-in-out infinite;
  }
  .ishoo-orb__ball {
    position: relative;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    overflow: hidden;
    /* SLEEPING tone: cool periwinkle → blue */
    background: linear-gradient(168deg, #7d70dc 0%, #6062d8 30%, #3f6bea 62%, #2f7df6 88%, #4a90fa 100%);
    box-shadow: inset 0 -14px 26px rgba(22, 40, 120, 0.3),
                inset 0 10px 20px rgba(255, 255, 255, 0.14);
  }
  /* top-right specular sheen */
  .ishoo-orb__ball::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(46% 38% at 72% 24%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.18) 42%, transparent 68%);
  }

  /* ---- set dressing: tiny stars inside the sphere ----------------------- */
  .ishoo-orb__star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0.8;
  }
  .ishoo-orb__star--1 { width: 2px; height: 2px; top: 30px; left: 34px; }
  .ishoo-orb__star--2 { width: 3px; height: 3px; top: 46px; left: 92px; opacity: 0.6; }
  .ishoo-orb__star--3 { width: 2px; height: 2px; top: 74px; left: 30px; opacity: 0.55; }
  .ishoo-orb__star--4 { width: 2px; height: 2px; top: 96px; left: 88px; opacity: 0.5; }

  /* ---- glyph: the crescent moon ----------------------------------------- */
  .ishoo-orb__moon {
    position: relative;
    z-index: 1;
    width: 78px;
    height: 78px;
    filter: drop-shadow(0 3px 6px rgba(20, 40, 130, 0.35));
  }

  /* ---- floating Zz ------------------------------------------------------ */
  .ishoo-orb__zzz {
    position: absolute;
    top: 30px;
    left: 74px;
    z-index: 2;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.92);
  }
  .ishoo-orb__zzz span {
    position: absolute;
    display: inline-block;
    text-shadow: 0 2px 5px rgba(40, 60, 150, 0.35);
    animation: ishoo-orb-floatz 3.2s ease-in-out infinite;
  }
  .ishoo-orb__zzz .z1 { font-size: 17px; left: 0; top: 6px; animation-delay: 0s; }
  .ishoo-orb__zzz .z2 { font-size: 12px; left: 13px; top: 0; animation-delay: 1.6s; }

  /* ---- motion ----------------------------------------------------------- */
  @keyframes ishoo-orb-bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  @keyframes ishoo-orb-floatz {
    0%   { opacity: 0; transform: translate(0, 4px) scale(0.85); }
    25%  { opacity: 1; }
    70%  { opacity: 0.65; }
    100% { opacity: 0; transform: translate(7px, -16px) scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ishoo-orb__wrap { animation: none !important; }
    .ishoo-orb__zzz span { animation: none !important; opacity: 0.85; }
  }
</style>

<div class="ishoo-orb ishoo-orb--sleeping">
  <div class="ishoo-orb__wrap">
    <div class="ishoo-orb__ball">
      <i class="ishoo-orb__star ishoo-orb__star--1"></i>
      <i class="ishoo-orb__star ishoo-orb__star--2"></i>
      <i class="ishoo-orb__star ishoo-orb__star--3"></i>
      <i class="ishoo-orb__star ishoo-orb__star--4"></i>
      <!-- fat crescent: full circle minus an offset circle, opening upper-right -->
      <svg class="ishoo-orb__moon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <mask id="ishoo-orb-sleeping-crescent">
          <rect width="100" height="100" fill="#000" />
          <circle cx="48" cy="54" r="38" fill="#fff" />
          <circle cx="66" cy="36" r="33" fill="#000" />
        </mask>
        <rect width="100" height="100" fill="#fff" mask="url(#ishoo-orb-sleeping-crescent)" />
      </svg>
      <div class="ishoo-orb__zzz">
        <span class="z1">Z</span>
        <span class="z2">z</span>
      </div>
    </div>
  </div>
</div>
